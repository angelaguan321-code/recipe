<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <title>Sushi</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div class="item sushi">Sushi</div>
      <div class="item instruction">Instructions</div>
      <div class="item steps">
        <h1>Step 1</h1>
        <br>
        <p>Gather your ingredients and lay down a half sheet of nori</p>
        <br>
        <h1>Step 2</h1>
        <br>
        <p>Spread rice on the nori and sprinkle some sesame seeds</p>
        <br>
        <h1>Step 3</h1>
        <br>
        <p>Add your fillings like crab, avocado, and cucumber</p>
        <br>
        <h1>Step 4</h1>
        <br>
        <p>Lastly, roll it up and slice the sushi</p>
      </div>
    </div>
  </body>
</html>
