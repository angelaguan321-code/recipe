<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <title>Sushi</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <div class="item sushi">Sushi</div>
      <div class="item instruction">Instructions</div>
      <div class="item steps">
        <h1>Step 1</h1>
        <p>Gather your ingredients and lay down a half sheet of nori</p>
        <h1>Step 2</h1>
        <p>Spread rice on the nori and sprinkle some sesame seeds</p>
        <h1>Step 3</h1>
        <p>Add your fillings like crab, avocado, and cucumber</p>
        <h1>Step 4</h1>
        <p>Lastly, roll it up and slice the sushi</p>
      </div>
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <img src="https://dinnerthendessert.com/california-roll/" alt="image of sushi">
          </div>
          <div class="flip-card-back">
            <h2>Ingredients</h2>
            <p>text</p>
          </div>
        </div>
    </div>
  </body>
</html>
